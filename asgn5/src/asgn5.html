<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Assignment 5 - Three.js World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #eee;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      overflow: hidden;
    }
    canvas { display: block; }
    #blocker {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
    }
    #instructions {
      text-align: center;
      max-width: 420px;
    }
    #instructions h1 {
      font-size: 30px;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }
    #instructions p {
      font-size: 14px;
      line-height: 1.9;
      color: #bbb;
    }
    #instructions kbd {
      background: #555;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
    }
    #fpsDisplay {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      color: #0f0;
      padding: 6px 12px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 14px;
      z-index: 10;
    }
    #info {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.5);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      z-index: 10;
      pointer-events: none;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.5);
      font-size: 24px;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="blocker">
    <div id="instructions">
      <h1>Three.js World</h1>
      <p>Click anywhere to explore</p>
      <p>
        <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> or Arrow keys to move<br>
        Mouse to look around<br>
        <kbd>Esc</kbd> to release cursor
      </p>
    </div>
  </div>
  <div id="fpsDisplay">FPS: --</div>
  <div id="info">
    <strong>Assignment 5</strong> &mdash; Three.js 3D World<br>
    20+ shapes &bull; 3 light types &bull; skybox &bull; GLB model
  </div>
  <div id="crosshair">+</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="asgn5.js"></script>
</body>
</html>
